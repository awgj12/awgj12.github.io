<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Antob</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600&family=Noto+Sans+JP&family=Noto+Sans+Arabic&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: linear-gradient(-45deg, #0f2027, #203a43, #2c5364, #1c1c1c);
  background-size: 400% 400%;
  animation: gradient 15s ease infinite;
  font-family: 'Montserrat', sans-serif;
  color: white;
}

@keyframes gradient {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

.container {
  text-align: center;
}

h1 {
  font-size: 22px;
  letter-spacing: 2px;
  opacity: 0.7;
  margin-bottom: 40px;
}

.navn {
  font-size: 56px;
  margin: 15px 0;
  opacity: 0;
  animation: fadeIn 1s forwards;
}

.navn:nth-child(2) { animation-delay: 0.5s; }
.navn:nth-child(3) { animation-delay: 1.5s; }
.navn:nth-child(4) { animation-delay: 2.5s; }
.navn:nth-child(5) { animation-delay: 3.5s; }
.navn:nth-child(6) { animation-delay: 4.5s; }

@keyframes fadeIn {
  to { opacity: 1; transform: translateY(0); }
}

.glød {
  text-shadow: 0 0 10px rgba(255,255,255,0.8),
               0 0 25px rgba(0,150,255,0.7);
}

.jp { font-family: 'Noto Sans JP', sans-serif; }
.ar { font-family: 'Noto Sans Arabic', sans-serif; direction: rtl; }

</style>
</head>

<body>

<div class="container">
  <h1>Anton Antonio D.3</h1>

  <div class="navn glød">Anton</div>
  <div class="navn">Latin: Antonius</div>
  <div class="navn">Dansk: Anton</div>
  <div class="navn">Engelsk: Anton</div>
  <div class="navn">Spansk: Antonio</div>
  <div class="navn">Fransk: Antoine</div>
  <div class="navn">Tysk: Anton</div>
  <div class="navn jp">Japansk: アントン</div>
  <div class="navn ar">Arabisk: أنطون</div>
  <div class="navn ar">Græsk: Αντώνης</div>
  <div class="navn ar">Italiensk: Antonio</div>
  <div class="navn ar">Græsk: Αντώνης</div>
  <div class="navn ar">Kinesisk: 安东</div>
  <div class="navn ar">Russisk: Антон</div>
  <div class="navn ar">Persisk: آنتون</div>
</div>

</body>
</html>
